<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e0e0e">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RED Network</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --bg-deep: #0a0a0a;
    --card: #161618;
    --card-elevated: #1c1c1f;
    --rose: #e8a4a4;
    --rose-soft: rgba(232,164,164,0.12);
    --rose-glow: rgba(232,164,164,0.25);
    --rose-mid: rgba(232,164,164,0.18);
    --gold: #d4a853;
    --gold-soft: rgba(212,168,83,0.12);
    --text: #e8e4df;
    --muted: #8a8680;
    --white: #f5f0eb;
    --scene-accent: #c48b8b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    -webkit-text-size-adjust: 100%;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .noise {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  .glow-top {
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse, var(--rose-glow) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 60px 28px 80px;
    position: relative;
    z-index: 1;
  }

  /* ── LANG TOGGLE ── */
  .lang-toggle {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-bottom: 36px;
    animation: fadeUp 0.6s ease both;
  }

  .lang-btn {
    background: transparent;
    border: 1px solid rgba(232,164,164,0.12);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 8px 20px;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 0;
    position: relative;
    overflow: hidden;
  }

  .lang-btn::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) scaleX(0);
    width: 60%;
    height: 2px;
    background: var(--rose);
    transition: transform 0.3s ease;
  }

  .lang-btn:first-child { border-radius: 20px 0 0 20px; }
  .lang-btn:last-child { border-radius: 0 20px 20px 0; }

  .lang-btn.active {
    background: var(--rose-soft);
    border-color: var(--rose);
    color: var(--rose);
  }

  .lang-btn.active::after { transform: translateX(-50%) scaleX(1); }

  .lang-btn:not(.active):hover {
    border-color: rgba(232,164,164,0.3);
    color: var(--text);
    background: rgba(232,164,164,0.04);
  }

  /* ── HEADER ── */
  .brand {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeUp 1s ease both;
  }

  .brand-block {
    display: inline-block;
    text-align: right;
  }

  .brand-mark {
    font-family: 'Playfair Display', serif;
    font-size: 3.2rem;
    font-weight: 700;
    color: var(--rose);
    letter-spacing: 0.15em;
    margin-bottom: 0;
    line-height: 1;
    text-align: right;
  }

  .brand-sub {
    font-size: 0.72rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--white);
    font-weight: 400;
    margin-top: 2px;
    text-align: right;
  }

  /* ── HERO ── */
  .hero {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeUp 1s 0.15s ease both;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.85rem;
    font-weight: 400;
    color: var(--white);
    line-height: 1.35;
    margin-bottom: 20px;
  }

  .hero h1 em {
    color: var(--rose);
    font-style: italic;
  }

  .hero p {
    font-size: 1.02rem;
    color: var(--text);
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.8;
    text-align: justify;
    hyphens: auto;
    -webkit-hyphens: auto;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 48px;
    height: 1px;
    background: var(--rose);
    margin: 48px auto;
    opacity: 0.4;
  }

  /* ── SECTION ── */
  .section {
    margin-bottom: 48px;
  }

  .section.reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .section.reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--rose);
    font-weight: 600;
    margin-bottom: 16px;
  }

  .section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.45rem;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 16px;
    line-height: 1.4;
  }

  .section p {
    font-size: 0.95rem;
    color: var(--text);
    margin-bottom: 12px;
    text-align: justify;
    hyphens: auto;
    -webkit-hyphens: auto;
  }

  /* ── STEPS ── */
  .steps {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin: 24px 0;
  }

  .step-item {
    display: flex;
    gap: 20px;
    padding: 20px 0;
    border-bottom: 1px solid rgba(232,164,164,0.06);
    opacity: 0;
    transform: translateX(-20px);
    transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .step-item.step-visible {
    opacity: 1;
    transform: translateX(0);
  }

  .step-item:last-child { border-bottom: none; }

  .step-num {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--rose-soft);
    color: var(--rose);
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
    transition: all 0.3s ease;
  }

  .step-item:hover .step-num {
    background: var(--rose-mid);
    transform: scale(1.08);
  }

  .step-text { flex: 1; }

  .step-text strong {
    color: var(--white);
    font-weight: 500;
    display: block;
    margin-bottom: 4px;
    font-size: 0.95rem;
  }

  .step-text span {
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.6;
  }

  /* ── HIGHLIGHT BOX ── */
  .highlight-box {
    background: var(--card);
    border: 1px solid rgba(232,164,164,0.1);
    border-radius: 16px;
    padding: 28px 24px;
    margin: 28px 0;
    position: relative;
    overflow: hidden;
  }

  .highlight-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: linear-gradient(to bottom, var(--rose), transparent);
  }

  .highlight-box h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--white);
    margin-bottom: 12px;
    font-weight: 400;
  }

  .highlight-box p {
    font-size: 0.9rem;
    color: var(--text);
    margin-bottom: 8px;
    text-align: justify;
    hyphens: auto;
    -webkit-hyphens: auto;
  }

  .highlight-box p:last-child { margin-bottom: 0; }

  /* ── TIERS ── */
  .tiers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin: 28px 0;
  }

  .tier-card {
    background: var(--card);
    border: 1px solid rgba(232,164,164,0.08);
    border-radius: 14px;
    padding: 24px 20px;
    text-align: center;
    transition: border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
  }

  .tier-card:hover {
    border-color: rgba(232,164,164,0.2);
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(232,164,164,0.06);
  }

  .tier-card.centurion {
    border-color: rgba(212,168,83,0.2);
    background: linear-gradient(135deg, var(--card) 0%, rgba(212,168,83,0.04) 100%);
  }

  .tier-card.centurion:hover {
    border-color: rgba(212,168,83,0.4);
    box-shadow: 0 8px 32px rgba(212,168,83,0.08);
  }

  .tier-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--white);
    margin-bottom: 6px;
  }

  .tier-card.centurion .tier-title { color: var(--gold); }

  .tier-sub {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .tier-amount {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--rose);
    margin-bottom: 4px;
  }

  .tier-card.centurion .tier-amount { color: var(--gold); }

  .tier-detail {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.6;
    text-align: justify;
    hyphens: auto;
    -webkit-hyphens: auto;
  }

  /* ── BENEFIT LIST ── */
  .benefits { margin: 20px 0; }

  .benefit {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 10px 0;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.5s ease;
  }

  .benefit.benefit-visible {
    opacity: 1;
    transform: translateY(0);
  }

  .benefit-icon {
    flex-shrink: 0;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--rose);
    margin-top: 8px;
    transition: transform 0.2s ease;
  }

  .benefit:hover .benefit-icon { transform: scale(1.6); }

  .benefit-text {
    font-size: 0.92rem;
    color: var(--text);
    text-align: justify;
    hyphens: auto;
    -webkit-hyphens: auto;
  }

  /* ══════════════════════════════════════════════
     ── VIDEO EXPLAINER SCRIPT SECTION ──
     ══════════════════════════════════════════════ */

  .script-section {
    margin-top: 20px;
    padding-top: 40px;
  }

  .script-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .script-header .section-label {
    margin-bottom: 12px;
  }

  .script-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 10px;
    line-height: 1.4;
  }

  .script-header p {
    font-size: 0.88rem;
    color: var(--muted);
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── SCENE CARD ── */
  .scene-card {
    background: var(--card);
    border: 1px solid rgba(232,164,164,0.08);
    border-radius: 18px;
    margin-bottom: 24px;
    overflow: hidden;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s ease, transform 0.7s ease, border-color 0.3s ease, box-shadow 0.3s ease;
  }

  .scene-card.scene-visible {
    opacity: 1;
    transform: translateY(0);
  }

  .scene-card:hover {
    border-color: rgba(232,164,164,0.15);
    box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  }

  .scene-top {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px 16px;
  }

  .scene-badge {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--bg);
    background: linear-gradient(135deg, var(--rose) 0%, var(--scene-accent) 100%);
    position: relative;
  }

  .scene-badge .scene-icon {
    font-size: 1.15rem;
    line-height: 1;
  }

  .scene-meta { flex: 1; }

  .scene-label {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .scene-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--white);
    font-weight: 400;
  }

  .scene-timing {
    flex-shrink: 0;
    font-size: 0.7rem;
    color: var(--muted);
    background: rgba(232,164,164,0.06);
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  .scene-body {
    padding: 0 24px 20px;
  }

  .scene-subsection {
    margin-bottom: 16px;
  }

  .scene-subsection:last-child { margin-bottom: 0; }

  .scene-sub-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--rose);
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .scene-sub-label::before {
    content: '';
    display: block;
    width: 12px;
    height: 1px;
    background: var(--rose);
    opacity: 0.5;
  }

  .scene-narration {
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.75;
    padding-left: 18px;
    border-left: 2px solid rgba(232,164,164,0.1);
    font-style: italic;
  }

  .scene-animation {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.65;
    padding: 12px 16px;
    background: rgba(232,164,164,0.03);
    border-radius: 10px;
    border: 1px solid rgba(232,164,164,0.05);
  }

  .scene-animation code {
    color: var(--rose);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    background: var(--rose-soft);
    padding: 1px 6px;
    border-radius: 4px;
  }

  /* ── SCENE SEPARATOR ── */
  .scene-sep {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 8px 0;
    opacity: 0.3;
  }

  .scene-sep span {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--rose);
  }

  /* ── SCRIPT SUMMARY BOX ── */
  .script-summary {
    background: linear-gradient(135deg, var(--card) 0%, rgba(212,168,83,0.03) 100%);
    border: 1px solid rgba(212,168,83,0.12);
    border-radius: 16px;
    padding: 28px 24px;
    margin-top: 36px;
  }

  .script-summary h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--gold);
    margin-bottom: 16px;
    font-weight: 400;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .summary-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .summary-key {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .summary-val {
    font-size: 0.9rem;
    color: var(--white);
    font-weight: 400;
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    margin-top: 64px;
    padding-top: 40px;
    border-top: 1px solid rgba(232,164,164,0.06);
  }

  .footer .brand-block .brand-mark { font-size: 1.6rem; margin-bottom: 0; }
  .footer .brand-block .brand-sub { font-size: 0.58rem; margin-bottom: 16px; }

  .footer .legal {
    font-size: 0.7rem;
    color: var(--white);
    margin-top: 40px;
    letter-spacing: 0.1em;
  }

  /* ── TAB NAVIGATOR ── */
  .tab-nav {
    display: flex;
    justify-content: center;
    gap: 0;
    margin: 36px 0 12px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .tab-btn {
    background: transparent;
    border: 1px solid rgba(232,164,164,0.1);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 22px;
    cursor: pointer;
    transition: all 0.35s ease;
    position: relative;
  }

  .tab-btn:first-child { border-radius: 24px 0 0 24px; }
  .tab-btn:last-child { border-radius: 0 24px 24px 0; }

  .tab-btn.active {
    background: var(--rose-soft);
    border-color: var(--rose);
    color: var(--rose);
  }

  .tab-btn:not(.active):hover {
    border-color: rgba(232,164,164,0.25);
    color: var(--text);
  }

  .tab-panel {
    display: none;
    animation: fadeIn 0.5s ease;
  }

  .tab-panel.active { display: block; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232,164,164,0.15); }
    50% { box-shadow: 0 0 20px 4px rgba(232,164,164,0.08); }
  }

  .scene-badge { animation: pulseGlow 3s ease-in-out infinite; }

  /* ── MOBILE ── */
  @media (max-width: 520px) {
    .container { padding: 36px 18px 56px; }

    .lang-toggle { margin-bottom: 28px; }
    .lang-btn { font-size: 0.65rem; padding: 6px 13px; }

    .brand { margin-bottom: 20px; }
    .brand-mark { font-size: 2.4rem; letter-spacing: 0.12em; }
    .brand-sub { font-size: 0.62rem; letter-spacing: 0.28em; }

    .hero { margin-bottom: 40px; }
    .hero h1 { font-size: 1.4rem; line-height: 1.4; margin-bottom: 16px; }
    .hero p { font-size: 0.92rem; line-height: 1.7; }

    .divider { margin: 36px auto; }

    .section { margin-bottom: 36px; }
    .section-label { font-size: 0.6rem; margin-bottom: 12px; }
    .section h2 { font-size: 1.25rem; margin-bottom: 12px; }
    .section p { font-size: 0.88rem; line-height: 1.7; }

    .steps { margin: 18px 0; }
    .step-item { gap: 14px; padding: 16px 0; }
    .step-num { width: 32px; height: 32px; font-size: 0.85rem; }
    .step-text strong { font-size: 0.88rem; }
    .step-text span { font-size: 0.8rem; }

    .highlight-box { padding: 22px 18px; margin: 20px 0; border-radius: 12px; }
    .highlight-box h3 { font-size: 1rem; }
    .highlight-box p { font-size: 0.85rem; }

    .tiers { grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
    .tier-card { padding: 20px 14px; border-radius: 12px; }
    .tier-title { font-size: 0.9rem; }
    .tier-sub { font-size: 0.65rem; letter-spacing: 0.15em; margin-bottom: 12px; }
    .tier-amount { font-size: 1.5rem; }
    .tier-detail { font-size: 0.72rem; }

    .benefits { margin: 14px 0; }
    .benefit { gap: 12px; padding: 8px 0; }
    .benefit-icon { width: 5px; height: 5px; margin-top: 7px; }
    .benefit-text { font-size: 0.85rem; }

    .tab-nav { margin: 28px 0 8px; }
    .tab-btn { font-size: 0.65rem; padding: 8px 16px; }

    .scene-top { padding: 16px 18px 12px; gap: 12px; }
    .scene-badge { width: 38px; height: 38px; border-radius: 10px; font-size: 0.78rem; }
    .scene-badge .scene-icon { font-size: 1rem; }
    .scene-title { font-size: 0.95rem; }
    .scene-body { padding: 0 18px 16px; }
    .scene-narration { font-size: 0.84rem; padding-left: 14px; }
    .scene-animation { font-size: 0.78rem; padding: 10px 14px; }
    .script-summary { padding: 22px 18px; }
    .summary-grid { gap: 10px; }

    .footer { margin-top: 48px; padding-top: 32px; }
    .footer .brand-block .brand-mark { font-size: 1.3rem; }
    .footer .brand-block .brand-sub { font-size: 0.5rem; }
    .footer .legal { font-size: 0.65rem; }

    .glow-top { width: 400px; height: 300px; top: -120px; opacity: 0.3; }
  }

var currentLang = 'es';

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('panel-' + tab).classList.add('active');
  document.getElementById('tab-' + tab + '-btn').classList.add('active');

  // Re-trigger animations in the newly active tab
  setTimeout(function() {
    triggerScrollAnimations();
    if (tab === 'script') triggerSceneAnimations();
  }, 100);
}

  document.getElementById('t-step1-title').textContent = t.step1Title;

  document.getElementById('t-step2-title').textContent = t.step2Title;

  document.getElementById('t-step3-title').textContent = t.step3Title;
  document.getElementById('t-step3-desc').textContent = t.step3Desc;
  document.getElementById('t-step4-title').textContent = t.step4Title;
  document.getElementById('t-step4-desc').textContent = t.step4Desc;
  document.getElementById('t-step5-title').textContent = t.step5Title;
  document.getElementById('t-step5-desc').textContent = t.step5Desc;
  document.getElementById('t-s3-label').textContent = t.s3Label;
  document.getElementById('t-s3-h2').textContent = t.s3H2;

  document.getElementById('t-s4-label').textContent = t.s4Label;
  document.getElementById('t-s4-h2').textContent = t.s4H2;
  document.getElementById('t-s4-p1').textContent = t.s4P1;
  document.getElementById('t-tier1-sub').textContent = t.tier1Sub;

  document.getElementById('t-tier2-sub').textContent = t.tier2Sub;

  document.getElementById('t-tier2-detail').innerHTML = t.tier2Detail;
  document.getElementById('t-cent-h3').textContent = t.centH3;
  document.getElementById('t-cent-p1').textContent = t.centP1;
  document.getElementById('t-cent-p2').textContent = t.centP2;
  document.getElementById('t-s5-label').textContent = t.s5Label;
  document.getElementById('t-s5-h2').textContent = t.s5H2;

  var bEl = document.getElementById('t-benefits');
  bEl.innerHTML = '';
  t.benefits.forEach(function(txt, i) {
    var d = document.createElement('div');

    d.innerHTML = '<div class="benefit-icon"></div><div class="benefit-text">' + txt + '</div>';

  // Summary grid
  var grid = document.getElementById('t-summary-grid');
  grid.innerHTML = '';
  t.summaryItems.forEach(function(item) {
    var el = document.createElement('div');
    el.className = 'summary-item';
    el.innerHTML = '<div class="summary-key">' + item[0] + '</div><div class="summary-val">' + item[1] + '</div>';
    grid.appendChild(el);
  });

  // Scenes
  var scenesEl = document.getElementById('script-scenes');
  scenesEl.innerHTML = '';
  t.scenes.forEach(function(scene, i) {
    var html = '';
    if (i > 0) {
      html += '<div class="scene-sep"><span></span><span></span><span></span></div>';
    }
    html += '<div class="scene-card" style="transition-delay:' + (i * 0.1) + 's">';
    html += '  <div class="scene-top">';
    html += '    <div class="scene-badge"><span class="scene-icon">' + scene.icon + '</span></div>';
    html += '    <div class="scene-meta">';
    html += '      <div class="scene-label">' + scene.label + '</div>';
    html += '      <div class="scene-title">' + scene.title + '</div>';
    html += '    </div>';
    html += '    <div class="scene-timing">' + scene.timing + '</div>';
    html += '  </div>';
    html += '  <div class="scene-body">';
    html += '    <div class="scene-subsection">';
    html += '      <div class="scene-sub-label">' + (lang === 'es' ? 'Narración' : 'Voiceover') + '</div>';
    html += '      <div class="scene-narration">' + scene.narration + '</div>';
    html += '    </div>';
    html += '    <div class="scene-subsection" style="margin-top:14px">';
    html += '      <div class="scene-sub-label">' + (lang === 'es' ? 'Animación & Visual' : 'Animation & Visual') + '</div>';
    html += '      <div class="scene-animation">' + scene.animation + '</div>';
    html += '    </div>';
    html += '  </div>';
    html += '</div>';
    scenesEl.innerHTML += html;
  });

  // Re-trigger animations
  setTimeout(function() {
    triggerScrollAnimations();
    if (currentTab === 'script') triggerSceneAnimations();
  }, 50);
}

// ── SCROLL REVEAL ──
function triggerScrollAnimations() {
  var reveals = document.querySelectorAll('.reveal');
  reveals.forEach(function(el) {
    var top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 60) {
      el.classList.add('visible');
    }
  });

  var steps = document.querySelectorAll('.step-item');
  steps.forEach(function(el, i) {
    var top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 40) {
      setTimeout(function() { el.classList.add('step-visible'); }, i * 120);
    }
  });

  var benefits = document.querySelectorAll('.benefit');
  benefits.forEach(function(el, i) {
    var top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 30) {
      setTimeout(function() { el.classList.add('benefit-visible'); }, i * 80);
    }
  });
}

function triggerSceneAnimations() {
  var scenes = document.querySelectorAll('.scene-card');
  scenes.forEach(function(el, i) {
    var top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 40) {
      setTimeout(function() { el.classList.add('scene-visible'); }, i * 120);
    }
  });
}

window.addEventListener('scroll', function() {
  triggerScrollAnimations();
  if (currentTab === 'script') triggerSceneAnimations();
}, { passive: true });

// Init
setLang('es');
setTimeout(function() {
  triggerScrollAnimations();
}, 300);
</script>
