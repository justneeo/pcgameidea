<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e0e0e">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RED Network</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --card: #161618;
    --rose: #e8a4a4;
    --rose-soft: rgba(232,164,164,0.12);
    --rose-glow: rgba(232,164,164,0.25);
    --gold: #d4a853;
    --gold-soft: rgba(212,168,83,0.12);
    --text: #e8e4df;
    --muted: #8a8680;
    --white: #f5f0eb;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    -webkit-text-size-adjust: 100%;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .noise {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  .glow-top {
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse, var(--rose-glow) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 28px 80px;
    position: relative;
    z-index: 1;
  }

  /* ── LANG TOGGLE ── */
  .lang-toggle {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 36px;
    animation: fadeUp 0.6s ease both;
  }

  .lang-btn {
    background: transparent;
    border: 1px solid rgba(232,164,164,0.12);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 7px 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    border-radius: 0;
  }

  .lang-btn:first-child { border-radius: 20px 0 0 20px; }
  .lang-btn:last-child { border-radius: 0 20px 20px 0; }

  .lang-btn.active {
    background: var(--rose-soft);
    border-color: var(--rose);
    color: var(--rose);
  }

  .lang-btn:not(.active):hover {
    border-color: rgba(232,164,164,0.3);
    color: var(--text);
  }

  /* ── HEADER ── */
  .brand {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeUp 1s ease both;
  }

  .brand-block {
    display: inline-block;
    text-align: right;
  }

  .brand-mark {
    font-family: 'Playfair Display', serif;
    font-size: 3.2rem;
    font-weight: 700;
    color: var(--rose);
    letter-spacing: 0.15em;
    margin-bottom: 0;
    line-height: 1;
    text-align: right;
  }

  .brand-sub {
    font-size: 0.72rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--white);
    font-weight: 400;
    margin-top: 2px;
    text-align: right;
  }

  /* ── HERO ── */
  .hero {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeUp 1s 0.15s ease both;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.85rem;
    font-weight: 400;
    color: var(--white);
    line-height: 1.35;
    margin-bottom: 20px;
  }

  .hero h1 em {
    color: var(--rose);
    font-style: italic;
  }

  .hero p {
    font-size: 1.02rem;
    color: var(--text);
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.8;
    text-align: justify;
    hyphens: auto;
    -webkit-hyphens: auto;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 48px;
    height: 1px;
    background: var(--rose);
    margin: 48px auto;
    opacity: 0.4;
  }

  /* ── SECTION ── */
  .section {
    margin-bottom: 48px;
    animation: fadeUp 0.8s ease both;
  }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--rose);
    font-weight: 600;
    margin-bottom: 16px;
  }

  .section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.45rem;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 16px;
    line-height: 1.4;
  }

  .section p {
    font-size: 0.95rem;
    color: var(--text);
    margin-bottom: 12px;
    text-align: justify;
    hyphens: auto;
    -webkit-hyphens: auto;
  }

  /* ── STEPS ── */
  .steps {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin: 24px 0;
  }

  .step-item {
    display: flex;
    gap: 20px;
    padding: 20px 0;
    border-bottom: 1px solid rgba(232,164,164,0.06);
  }

  .step-item:last-child { border-bottom: none; }

  .step-num {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--rose-soft);
    color: var(--rose);
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }

  .step-text { flex: 1; }

  .step-text strong {
    color: var(--white);
    font-weight: 500;
    display: block;
    margin-bottom: 4px;
    font-size: 0.95rem;
  }

  .step-text span {
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.6;
  }

  /* ── HIGHLIGHT BOX ── */
  .highlight-box {
    background: var(--card);
    border: 1px solid rgba(232,164,164,0.1);
    border-radius: 16px;
    padding: 28px 24px;
    margin: 28px 0;
    position: relative;
    overflow: hidden;
  }

  .highlight-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: linear-gradient(to bottom, var(--rose), transparent);
  }

  .highlight-box h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--white);
    margin-bottom: 12px;
    font-weight: 400;
  }

  .highlight-box p {
    font-size: 0.9rem;
    color: var(--text);
    margin-bottom: 8px;
    text-align: justify;
    hyphens: auto;
    -webkit-hyphens: auto;
  }

  .highlight-box p:last-child { margin-bottom: 0; }

  /* ── TIERS ── */
  .tiers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin: 28px 0;
  }

  .tier-card {
    background: var(--card);
    border: 1px solid rgba(232,164,164,0.08);
    border-radius: 14px;
    padding: 24px 20px;
    text-align: center;
    transition: border-color 0.3s ease, transform 0.3s ease;
  }

  .tier-card:hover {
    border-color: rgba(232,164,164,0.2);
    transform: translateY(-2px);
  }

  .tier-card.centurion {
    border-color: rgba(212,168,83,0.2);
    background: linear-gradient(135deg, var(--card) 0%, rgba(212,168,83,0.04) 100%);
  }

  .tier-card.centurion:hover { border-color: rgba(212,168,83,0.4); }

  .tier-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--white);
    margin-bottom: 6px;
  }

  .tier-card.centurion .tier-title { color: var(--gold); }

  .tier-sub {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .tier-amount {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--rose);
    margin-bottom: 4px;
  }

  .tier-card.centurion .tier-amount { color: var(--gold); }

  .tier-detail {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.6;
    text-align: justify;
    hyphens: auto;
    -webkit-hyphens: auto;
  }

  /* ── BENEFIT LIST ── */
  .benefits { margin: 20px 0; }

  .benefit {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 10px 0;
  }

  .benefit-icon {
    flex-shrink: 0;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--rose);
    margin-top: 8px;
  }

  .benefit-text {
    font-size: 0.92rem;
    color: var(--text);
    text-align: justify;
    hyphens: auto;
    -webkit-hyphens: auto;
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    margin-top: 64px;
    padding-top: 40px;
    border-top: 1px solid rgba(232,164,164,0.06);
    animation: fadeUp 0.8s 0.6s ease both;
  }

  .footer .brand-block .brand-mark { font-size: 1.6rem; margin-bottom: 0; }
  .footer .brand-block .brand-sub { font-size: 0.58rem; margin-bottom: 16px; }

  .footer .legal {
    font-size: 0.7rem;
    color: var(--white);
    margin-top: 40px;
    letter-spacing: 0.1em;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── MOBILE ── */
  @media (max-width: 520px) {
    .container { padding: 36px 18px 56px; }

    .lang-toggle { margin-bottom: 28px; }
    .lang-btn { font-size: 0.65rem; padding: 6px 13px; }

    .brand { margin-bottom: 20px; }
    .brand-mark { font-size: 2.4rem; letter-spacing: 0.12em; }
    .brand-sub { font-size: 0.62rem; letter-spacing: 0.28em; }

    .hero { margin-bottom: 40px; }
    .hero h1 { font-size: 1.4rem; line-height: 1.4; margin-bottom: 16px; }
    .hero p { font-size: 0.92rem; line-height: 1.7; }

    .divider { margin: 36px auto; }

    .section { margin-bottom: 36px; }
    .section-label { font-size: 0.6rem; margin-bottom: 12px; }
    .section h2 { font-size: 1.25rem; margin-bottom: 12px; }
    .section p { font-size: 0.88rem; line-height: 1.7; }

    .steps { margin: 18px 0; }
    .step-item { gap: 14px; padding: 16px 0; }
    .step-num { width: 32px; height: 32px; font-size: 0.85rem; }
    .step-text strong { font-size: 0.88rem; }
    .step-text span { font-size: 0.8rem; }

    .highlight-box { padding: 22px 18px; margin: 20px 0; border-radius: 12px; }
    .highlight-box h3 { font-size: 1rem; }
    .highlight-box p { font-size: 0.85rem; }

    .tiers { grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
    .tier-card { padding: 20px 14px; border-radius: 12px; }
    .tier-title { font-size: 0.9rem; }
    .tier-sub { font-size: 0.65rem; letter-spacing: 0.15em; margin-bottom: 12px; }
    .tier-amount { font-size: 1.5rem; }
    .tier-detail { font-size: 0.72rem; }

    .benefits { margin: 14px 0; }
    .benefit { gap: 12px; padding: 8px 0; }
    .benefit-icon { width: 5px; height: 5px; margin-top: 7px; }
    .benefit-text { font-size: 0.85rem; }

    .footer { margin-top: 48px; padding-top: 32px; }
    .footer .brand-block .brand-mark { font-size: 1.3rem; }
    .footer .brand-block .brand-sub { font-size: 0.5rem; }
    .footer .legal { font-size: 0.65rem; }

    .glow-top { width: 400px; height: 300px; top: -120px; opacity: 0.3; }
  }

  @media (max-width: 360px) {
    .container { padding: 28px 14px 48px; }
    .brand-mark { font-size: 2rem; }
    .hero h1 { font-size: 1.25rem; }
    .tiers { grid-template-columns: 1fr; gap: 10px; }
    .tier-amount { font-size: 1.6rem; }
  }
</style>
</head>
